<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apollo's Table — Security Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128737;</text></svg>">
</head>
<body>

  <!-- Password Gate -->
  <div id="password-overlay" class="password-overlay">
    <div class="gate-brand">
      <h1>Apollo's Table</h1>
      <p>Security Scanner Pipeline</p>
    </div>
    <form class="gate-form">
      <input type="password" class="gate-input" placeholder="Password" autocomplete="off" spellcheck="false">
      <button type="submit">Enter</button>
    </form>
    <div class="gate-error"></div>
  </div>

  <!-- App Shell -->
  <div class="app-shell">
    <nav class="top-nav">
      <div class="nav-brand">Apollo's Table</div>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Pipeline</a></li>
      </ul>
      <div class="nav-settings">
        <button id="settings-toggle" title="Settings" aria-label="Settings">&#9881;</button>
      </div>
    </nav>

    <aside id="settings-panel" class="settings-panel">
      <h3>Settings</h3>
      <div class="settings-group">
        <label for="new-password">Change Password</label>
        <form class="settings-pass-form">
          <input type="password" id="new-password" placeholder="New password" autocomplete="off">
          <button type="submit" class="btn-save">Update</button>
          <div class="settings-msg" style="margin-top:0.3rem;font-size:0.8rem;color:var(--green);height:1em;"></div>
        </form>
      </div>
      <div class="settings-group">
        <button class="btn-logout">Log Out</button>
      </div>
    </aside>

    <main class="main-content">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">Discovered</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Scanned</div>
          <div class="stat-value gold" id="stat-scanned">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Reports Ready</div>
          <div class="stat-value green" id="stat-reported">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Outreach Sent</div>
          <div class="stat-value" id="stat-outreach">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Responses</div>
          <div class="stat-value green" id="stat-responses">0</div>
        </div>
      </div>

      <!-- Grade Breakdown -->
      <div class="grade-bar" id="grade-bar"></div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-group">
          <label for="filter-stage">Stage</label>
          <select id="filter-stage">
            <option value="all">All</option>
            <option value="discovered">Discovered</option>
            <option value="scanned">Scanned</option>
            <option value="report_draft">Report Draft</option>
            <option value="report_ready">Report Ready</option>
            <option value="outreach_sent">Outreach Sent</option>
            <option value="responded">Responded</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-grade">Grade</label>
          <select id="filter-grade">
            <option value="all">All</option>
            <option value="F">F</option>
            <option value="D">D</option>
            <option value="C">C</option>
            <option value="B">B</option>
            <option value="A">A</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-category">Category</label>
          <select id="filter-category">
            <option value="all">All</option>
          </select>
        </div>
        <div class="filter-spacer"></div>
        <div class="filter-count" id="filter-count">0 businesses</div>
      </div>

      <!-- Business Cards -->
      <div class="deals-grid" id="business-container">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">&#9203;</div>
          <h3>Loading...</h3>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
